hydra:
  run:
    dir: ${output_dir}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    root: null
    disable_existing_loggers: false
  job_logging:
    version: 1
    root: null
    disable_existing_loggers: false
  env: {}
  searchpath:
  - file:///workspace/nuplan-project/workspace/lexicone/planning/config
  - pkg://nuplan.planning.script.config.common
  - pkg://nuplan.planning.script.experiments
  callbacks: {}
  output_subdir: ${output_dir}/code/hydra
  overrides:
    hydra:
    - hydra.searchpath=[file:///workspace/nuplan-project/workspace/lexicone/planning/config,pkg://nuplan.planning.script.config.common,pkg://nuplan.planning.script.experiments]
    task:
    - +simulation=closed_loop_nonreactive_agents
    - planner=two_level_mpc_planner
    - planner.two_level_mpc_planner.mpc_horizon_s=2.0
    - planner.two_level_mpc_planner.mpc_dt_s=0.1
    - planner.two_level_mpc_planner.replan_period_s=5.0
    - planner.two_level_mpc_planner.desired_speed_mps=12.0
    - scenario_builder=nuplan_mini
    - scenario_filter=one_continuous_log
    - scenario_filter.log_names=[2021.06.09.12.39.51_veh-26_05620_06003]
    - scenario_filter.limit_total_scenarios=1
    - worker=sequential
    - experiment_name=two_level_mpc_h2.0_v12.0
    - job_name=two_level_mpc_h2.0_v12.0
  job:
    name: run_simulation
    override_dirname: +simulation=closed_loop_nonreactive_agents,experiment_name=two_level_mpc_h2.0_v12.0,job_name=two_level_mpc_h2.0_v12.0,planner.two_level_mpc_planner.desired_speed_mps=12.0,planner.two_level_mpc_planner.mpc_dt_s=0.1,planner.two_level_mpc_planner.mpc_horizon_s=2.0,planner.two_level_mpc_planner.replan_period_s=5.0,planner=two_level_mpc_planner,scenario_builder=nuplan_mini,scenario_filter.limit_total_scenarios=1,scenario_filter.log_names=[2021.06.09.12.39.51_veh-26_05620_06003],scenario_filter=one_continuous_log,worker=sequential
    id: ???
    num: ???
    config_name: default_simulation
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.1.0.rc1
    cwd: /workspace/nuplan-devkit
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/nuplan-devkit/nuplan/planning/script/config/simulation
      schema: file
      provider: main
    - path: /workspace/nuplan-project/workspace/lexicone/planning/config
      schema: file
      provider: hydra.searchpath in command-line
    - path: nuplan.planning.script.config.common
      schema: pkg
      provider: hydra.searchpath in command-line
    - path: nuplan.planning.script.experiments
      schema: pkg
      provider: hydra.searchpath in command-line
    - path: ''
      schema: structured
      provider: schema
    choices:
      simulation: closed_loop_nonreactive_agents
      simulation_time_controller: step_simulation_time_controller
      planner: two_level_mpc_planner
      ego_controller: two_stage_controller
      ego_controller/motion_model: kinematic_bicycle_model
      ego_controller/tracker: lqr_tracker
      observation: box_observation
      splitter: nuplan
      simulation_metric: simulation_closed_loop_nonreactive_agents
      worker: sequential
      model: null
      scenario_filter: one_continuous_log
      scenario_builder: nuplan_mini
      scenario_builder/scenario_mapping: nuplan_scenario_mapping
      scenario_builder/vehicle_parameters: nuplan_vehicle_parameters
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: none
      hydra/hydra_logging: none
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false

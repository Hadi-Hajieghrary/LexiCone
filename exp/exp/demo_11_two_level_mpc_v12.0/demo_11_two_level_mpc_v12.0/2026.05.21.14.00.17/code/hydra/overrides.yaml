- +simulation=closed_loop_nonreactive_agents
- planner=two_level_mpc_planner
- planner.two_level_mpc_planner.mpc_horizon_s=2.0
- planner.two_level_mpc_planner.mpc_dt_s=0.1
- planner.two_level_mpc_planner.replan_period_s=5.0
- planner.two_level_mpc_planner.desired_speed_mps=12.0
- scenario_builder=nuplan_mini
- scenario_filter=all_scenarios
- scenario_filter.scenario_types=[medium_magnitude_speed,high_magnitude_speed,low_magnitude_speed,following_lane_with_lead,following_lane_without_lead,following_lane_with_slow_lead,near_high_speed_vehicle,near_multiple_vehicles,traversing_intersection,traversing_traffic_light_intersection,on_intersection,starting_straight_traffic_light_intersection_traversal,starting_straight_stop_sign_intersection_traversal,behind_long_vehicle,changing_lane,starting_right_turn,starting_left_turn]
- scenario_filter.limit_total_scenarios=1
- scenario_filter.ego_displacement_minimum_m=20.0
- scenario_filter.ego_start_speed_threshold=3.0
- scenario_filter.shuffle=true
- seed=7
- worker=sequential
- experiment_name=demo_11_two_level_mpc_v12.0
- job_name=demo_11_two_level_mpc_v12.0
